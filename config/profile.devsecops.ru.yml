# ─────────────────────────────────────────────────────────────────
# Scoring weights for DevSecOps specialization.
# Sum = 1.0. Customized to weight security tooling match heavily.
#
# security_tooling_match — покрытие инструментами: Semgrep, Trivy,
#   Snyk, SonarQube, Vault, ArgoCD, Falco, OPA + российский стек:
#   PT Application Inspector, MaxPatrol, Kaspersky, BI.ZONE.
# remote_friendly — наличие удалённого формата (критично для РФ-рынка).
# relocation_support — релокационный пакет / поддержка переезда.
# brand_recognition — узнаваемость работодателя в security-сообществе.
# ─────────────────────────────────────────────────────────────────
scoring_weights:
  cv_match: 0.15              # соответствие навыков и опыта CV
  north_star_fit: 0.15        # совпадение с целевыми архетипами выше
  compensation: 0.10          # зарплата vs рынок
  cultural_signals: 0.05      # культура, рост, стабильность
  red_flags: 0.05             # блокеры и предупреждения (негативно)
  security_tooling_match: 0.20  # совпадение по security-инструментарию
  remote_friendly: 0.15       # удалённый формат работы
  relocation_support: 0.10    # релокационный пакет
  brand_recognition: 0.05     # репутация в security-сообществе

cv:
  output_format: "html"
