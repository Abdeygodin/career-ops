  location_flexibility: "Удалённо предпочтительно; офис/гибрид — Москва"

location:
  country: "Россия"
  city: "Москва"
  timezone: "MSK (UTC+3)"
  visa_status: "Гражданин РФ"

language:
  modes_dir: modes/ru

# ─────────────────────────────────────────────────────────────────
# Scoring weights for Product Manager specialization.
# Sum = 1.0.
#
# domain_fit — совпадение продуктового домена (fintech, edtech,
#   e-commerce, b2b-saas, marketplace и т.д.).
# company_stage — стадия компании (стартап / growth / enterprise)
#   и её соответствие опыту кандидата.
# growth_opportunity — наличие горизонта роста (CPO, своя команда,
#   новые продукты).
# autonomy — самостоятельность PM в принятии решений (не исполнитель).
# ─────────────────────────────────────────────────────────────────
scoring_weights:
  cv_match: 0.15              # соответствие опыта и навыков CV
  north_star_fit: 0.15        # совпадение с целевыми архетипами
  compensation: 0.15          # зарплата vs рынок
  cultural_signals: 0.05      # культура, процессы, стабильность
  red_flags: 0.05             # блокеры и предупреждения (негативно)
  domain_fit: 0.20            # совпадение продуктового домена
  company_stage: 0.10         # стадия компании vs опыт кандидата
  growth_opportunity: 0.10    # горизонт роста внутри компании
  autonomy: 0.05              # реальная самостоятельность PM

cv:
  output_format: "html"
