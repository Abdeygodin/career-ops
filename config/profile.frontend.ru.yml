# Frontend Developer Profile — Russian Market
# ─────────────────────────────────────────────────────────────────
# Ready-to-use profile for a Frontend / UI Engineer
# targeting the Russian IT market (hh.ru, Хабр Карьера, Telegram).
#
# HOW TO USE:
#   cp config/profile.frontend.ru.yml config/profile.yml
#   Then fill in YOUR personal details in the candidate section.
#   To switch specialization — copy a different profile.*.yml over profile.yml.
#   No code changes needed.
# ─────────────────────────────────────────────────────────────────

candidate:
  full_name: "Иван Иванов"
  email: "ivan@example.com"
  phone: "+7-900-000-0000"
  location: "Москва / удалённо"
  linkedin: ""
  portfolio_url: ""           # ссылка на портфолио / Behance / Dribbble
  github: "github.com/ivanivanov"
  twitter: ""

target_roles:
  primary:
    - "Frontend Developer"
    - "React Developer"
    - "Vue Developer"          # замени под свой стек
  archetypes:
    - name: "Frontend Developer (React / Vue / Angular)"
      level: "Middle/Senior"
      fit: "primary"
    - name: "UI Engineer"
      level: "Middle/Senior"
      fit: "primary"
    - name: "Team Lead Frontend"
      level: "Lead"
      fit: "secondary"
    - name: "Full-Stack Engineer"
      level: "Middle/Senior"
      fit: "adjacent"
    - name: "Mobile Developer (React Native)"
      level: "Middle"
      fit: "adjacent"

narrative:
  headline: "Frontend-разработчик — создаю быстрые и удобные интерфейсы на React"
  exit_story: ""
  superpowers:
    - "Производительный React: memo, виртуализация, lazy loading, Core Web Vitals"
    - "Дизайн-система с нуля: токены, компоненты, Storybook, a11y"
    - "TypeScript strict mode: ноль any, полная типизация API-контрактов"
  proof_points: []

compensation:
  target_range: "170 000 — 300 000 ₽ gross"
  currency: "RUB"
  minimum: "140 000 ₽ gross"
  location_flexibility: "Удалённо предпочтительно; офис/гибрид — Москва"

location:
  country: "Россия"
  city: "Москва"
  timezone: "MSK (UTC+3)"
  visa_status: "Гражданин РФ"

language:
  modes_dir: modes/ru

# ─────────────────────────────────────────────────────────────────
# Scoring weights for Frontend specialization.
# Sum = 1.0.
#
# tech_stack_match — совпадение по фреймворку (React, Vue, Angular)
#   и инструментам (TypeScript, Vite, Webpack, Next.js, Nuxt).
# design_collab — наличие дизайн-команды и Figma в процессе.
# remote_friendly — удалённый формат (важно для фронтенда в РФ).
# product_quality — продуктовый подход vs аутсорс/конвейер.
# ─────────────────────────────────────────────────────────────────
scoring_weights:
  cv_match: 0.20              # соответствие навыков и опыта CV
  north_star_fit: 0.15        # совпадение с целевыми архетипами
  compensation: 0.15          # зарплата vs рынок
  cultural_signals: 0.05      # культура, рост, стабильность
  red_flags: 0.05             # блокеры и предупреждения (негативно)
  tech_stack_match: 0.20      # совпадение по фреймворку и стеку
  design_collab: 0.10         # наличие дизайн-команды и Figma
  remote_friendly: 0.10       # удалённый формат работы

cv:
  output_format: "html"
