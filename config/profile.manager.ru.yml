# Product / Project Manager Profile — Russian Market
# ─────────────────────────────────────────────────────────────────
# Ready-to-use profile for a Product Manager / Project Manager / PO
# targeting the Russian IT market (hh.ru, Хабр Карьера, Telegram).
#
# HOW TO USE:
#   cp config/profile.manager.ru.yml config/profile.yml
#   Then fill in YOUR personal details in the candidate section.
#   To switch specialization — copy a different profile.*.yml over profile.yml.
#   No code changes needed.
# ─────────────────────────────────────────────────────────────────

candidate:
  full_name: "Иван Иванов"
  email: "ivan@example.com"
  phone: "+7-900-000-0000"
  location: "Москва / удалённо"
  linkedin: ""
  portfolio_url: ""
  github: ""
  twitter: ""

target_roles:
  primary:
    - "Product Manager"
    - "Product Owner"
    - "Менеджер продукта"
  archetypes:
    - name: "Product Manager (B2B / B2C)"
      level: "Middle/Senior"
      fit: "primary"
    - name: "Product Owner"
      level: "Middle/Senior"
      fit: "primary"
    - name: "Head of Product"
      level: "Lead/Director"
      fit: "secondary"
    - name: "Project Manager / Delivery Manager"
      level: "Middle/Senior"
